<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrothersEnglishApp</title>
    <base href="/BrothersEnglishApp/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-keyboard@latest/build/css/index.css">
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BrothersEnglishApp.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/simple-keyboard@latest/build/index.min.js"></script>

    <script src="js/app.js"></script>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        let blazorUpdateNotifier;

        window.registerUpdateNotifier = (dotnetHelper) => {
            blazorUpdateNotifier = dotnetHelper;
        };

        // ★ register はここで1回だけにまとめるのが正解だぜ
        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' }).then(registration => {
            registration.onupdatefound = () => {
                const installingWorker = registration.installing;
                installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        if (blazorUpdateNotifier) {
                            blazorUpdateNotifier.invokeMethodAsync('ShowUpdateBanner');
                        }
                    }
                };
            };
        });

        window.activateUpdate = () => {
            navigator.serviceWorker.getRegistration().then(registration => {
                if (registration && registration.waiting) {
                    registration.waiting.postMessage('skip-waiting');
                }
            });
        };

        navigator.serviceWorker.addEventListener('controllerchange', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
